name: .NET

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 10.0.x
      - name: Get version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/TownSuite.AssemblyInfoUtil.csproj)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Restore dependencies
        run: cd src && dotnet restore AssemblyInfoUtils.sln
      - name: Build
        run: cd src && dotnet build AssemblyInfoUtils.sln --no-restore
      - name: Publish linux-x64
        run: dotnet publish src/TownSuite.AssemblyInfoUtil.csproj -c Release -r linux-x64 -p:PublishReadyToRun=true --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -f:net10.0 -o build/TownSuite.AssemblyInfoUtils.Linux.x64
      - name: Archive artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: TownSuite.AssemblyInfoUtils.v${{ env.APP_VERSION }}.Linux.x64
          path: build/TownSuite.AssemblyInfoUtils.Linux.x64
          retention-days: 1

  linux-arm64-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 10.0.x
      - name: Get version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/TownSuite.AssemblyInfoUtil.csproj)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Restore dependencies
        run: cd src && dotnet restore AssemblyInfoUtils.sln
      - name: Build
        run: cd src && dotnet build AssemblyInfoUtils.sln --no-restore
      - name: Publish linux-arm64
        run: dotnet publish src/TownSuite.AssemblyInfoUtil.csproj -c Release -r linux-arm64 -p:PublishReadyToRun=false --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -f:net10.0 -o build/TownSuite.AssemblyInfoUtils.Linux.arm64
      - name: Archive artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: TownSuite.AssemblyInfoUtils.v${{ env.APP_VERSION }}.Linux.arm64
          path: build/TownSuite.AssemblyInfoUtils.Linux.arm64
          retention-days: 1

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 10.0.x
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3.0.0
      - name: Get version
        shell: pwsh
        run: |
          $VERSION = ([xml](Get-Content src/TownSuite.AssemblyInfoUtil.csproj)).Project.PropertyGroup.Version
          echo "APP_VERSION=$VERSION" >> $env:GITHUB_ENV
      - name: Restore dependencies
        run: cd src && dotnet restore AssemblyInfoUtils.sln
      - name: Build
        run: cd src && dotnet build AssemblyInfoUtils.sln --no-restore
      - name: Publish win-x64 net10.0
        run: dotnet publish src/TownSuite.AssemblyInfoUtil.csproj -c Release -r win-x64 -p:PublishReadyToRun=true --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -f:net10.0 -o build/TownSuite.AssemblyInfoUtils.Windows
      - name: Publish net48
        run: dotnet publish src/TownSuite.AssemblyInfoUtil.csproj -c Release -f:net48 -o build/TownSuite.AssemblyInfoUtils.Windows.net48
      - name: Archive win-x64 artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: TownSuite.AssemblyInfoUtils.v${{ env.APP_VERSION }}.Windows
          path: build/TownSuite.AssemblyInfoUtils.Windows
          retention-days: 1
      - name: Archive net48 artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: TownSuite.AssemblyInfoUtils.v${{ env.APP_VERSION }}.Windows.net48
          path: build/TownSuite.AssemblyInfoUtils.Windows.net48
          retention-days: 1

  mac-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 10.0.x
      - name: Get version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/TownSuite.AssemblyInfoUtil.csproj)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Restore dependencies
        run: cd src && dotnet restore AssemblyInfoUtils.sln
      - name: Build
        run: cd src && dotnet build AssemblyInfoUtils.sln --no-restore
      - name: Publish osx-x64
        run: dotnet publish src/TownSuite.AssemblyInfoUtil.csproj -c Release -r osx-x64 -p:PublishReadyToRun=true --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -f:net10.0 -o build/TownSuite.AssemblyInfoUtils.macOS
      - name: Archive artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: TownSuite.AssemblyInfoUtils.v${{ env.APP_VERSION }}.macOS
          path: build/TownSuite.AssemblyInfoUtils.macOS
          retention-days: 1
